<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>早八滿堂｜漢神週五限定外送</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC",
          "Microsoft JhengHei", sans-serif;
        background: #fff8ef;
        color: #2b2b2b;
      }

      .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 16px;
        padding-bottom: 100px;
      }

      .store-header {
        position: relative;
        left: 50%;
        width: 100vw;
        max-width: 820px;
        transform: translateX(-50%);
        margin-top: -16px;
        margin-bottom: 16px;
        background: #fff8ef;
        overflow: visible;
      }

      .hero-image {
        width: 100%;
        height: 260px;
        background: #fff8ef;
        overflow: hidden;
      }

      .hero-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
        display: block;
      }

      .store-profile {
        position: relative;
        text-align: center;
        padding: 0 20px;
        background: #fff8ef;
      }

      /* 圓形 LOGO：往上浮到封面照上 */
      .store-logo {
        width: 110px;
        height: 110px;
        margin: 0 auto;
        transform: translateY(-55px);
        margin-bottom: -46px;
        border-radius: 50%;
        background: #fff8ef;
        border: 4px solid #fff8ef;
        overflow: hidden;
      }
      .store-logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .store-name {
        margin: 0;
        font-size: 30px;
        font-weight: 900;
        color: #222;
        line-height: 1.25;
      }

      .store-slogan {
        margin: 4px 0 0;
        font-size: 14px;
        color: #888;
        line-height: 1.5;
      }

      @media (max-width: 480px) {
        .hero-image {
          height: 180px;
        }

        .store-logo {
          width: 100px;
          height: 100px;
          transform: translateY(-42px);
          margin-bottom: -42px;
        }

        .store-name {
          font-size: 28px;
        }

        .store-slogan {
          font-size: 13px;
        }
      }
      /*
      .hero {
        background: linear-gradient(135deg, #ffcf6e, #ff9f43);
        border-radius: 20px;
        padding: 22px;
        margin-bottom: 16px;
        color: #3a2500;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .hero p {
        margin: 5px 0;
        line-height: 1.6;
        font-size: 14px;
      }
*/
      .notice {
        background: #fff;
        border-radius: 14px;
        padding: 14px;
        border: 1px solid #f0d6aa;
        line-height: 1.7;
        font-size: 14px;
        margin-bottom: 16px;
      }

      .category-nav {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        white-space: nowrap;
        background: #fff8ef;
        padding: 10px 0;
        margin-bottom: 12px;
        border-bottom: 1px solid #f1dfc4;
      }

      .category-nav button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        background: #fff;
        border: 1px solid #e8d0a7;
        color: #7a4a00;
        font-weight: 700;
        cursor: pointer;
      }

      .category-heading {
        margin: 32px 16px 10px;
      }

      .category-title {
        margin: 0;
        font-size: 26px;
        font-weight: 900;
        color: #222;
        line-height: 1.3;
      }

      .category-desc {
        margin-top: 6px;
        font-size: 14px;
        color: #777;
        line-height: 1.5;
      }

      .product-card {
        background: #fff;
        border-bottom: 1px solid #eeeeee;
        padding: 18px 16px;
        display: grid;
        grid-template-columns: 1fr 112px;
        gap: 16px;
        align-items: center;
      }

      .product-card:first-child {
        border-top: 1px solid #eeeeee;
      }

      .product-info {
        min-width: 0;
        cursor: pointer;
      }

      .product-type-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #fff1dd;
        color: #b85c00;
        font-size: 12px;
        font-weight: 800;
      }

      .product-name {
        margin: 0 0 8px;
        font-size: 20px;
        font-weight: 800;
        color: #222;
        line-height: 1.35;
      }

      .product-price {
        font-size: 20px;
        font-weight: 700;
        color: #222;
        margin-bottom: 8px;
      }

      .product-desc {
        margin: 0;
        color: #555;
        font-size: 15px;
        line-height: 1.5;
      }

      .product-image-box {
        position: relative;
        width: 112px;
        height: 112px;
        border-radius: 12px;
        background: #fff;
        overflow: visible;
        flex-shrink: 0;
        justify-self: end;
        margin-right: 6px;
        cursor: pointer;
      }

      .product-image-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 12px;
        display: block;
      }

      .product-image-box.no-image {
        background: #fff;
        border: none;
      }

      .product-add-badge {
        position: absolute;
        right: -2px;
        bottom: -8px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: #eeeeee;
        color: #555;
        border: 4px solid #fff;
        font-size: 24px;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        cursor: pointer;
        line-height: 1;
      }

      .product-add-badge.has-items {
        background: #ff7900;
        color: #fff;
        font-size: 18px;
        box-shadow: 0 3px 10px rgba(255, 121, 0, 0.28);
      }

      .product-add-badge:active {
        transform: scale(0.96);
      }

      .cart-bar {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        border-top: 1px solid #ecd8b6;
        padding: 12px 16px;
        z-index: 20;
      }

      .cart-bar-inner {
        max-width: 820px;
        margin: 0 auto;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .cart-info {
        flex: 1;
        font-weight: 800;
        color: #5c3900;
      }

      .cart-btn {
        border: none;
        border-radius: 12px;
        padding: 13px 18px;
        background: #2d2d2d;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 100;
        align-items: flex-end;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal {
        width: 100%;
        max-width: 820px;
        max-height: 95vh;
        overflow-y: auto;
        margin: 0 auto;
        background: #fff8ef;
        border-radius: 22px 22px 0 0;
        padding: 18px;
        padding-bottom: 28px;
        overscroll-behavior: contain;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .modal-header h2 {
        margin: 0;
        font-size: 21px;
      }

      .close-btn {
        border: none;
        background: #eee;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        font-size: 20px;
        cursor: pointer;
      }

      .price {
        color: #d35400;
        font-weight: 900;
      }

      .option-group,
      .combo-choice-group {
        background: #fff;
        border: 1px solid #eee0cb;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }

      .option-group h4,
      .combo-choice-group h4 {
        margin: 0 0 10px;
        font-size: 16px;
        font-weight: 900;
      }

      .option-row {
        display: grid;
        grid-template-columns: 24px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        font-size: 16px;
        line-height: 1.4;
        cursor: pointer;
      }

      .option-row + .option-row {
        border-top: 1px solid #f1f1f1;
      }

      .option-name {
        min-width: 0;
        color: #222;
        font-size: 16px;
        font-weight: 600;
        white-space: normal;
        word-break: keep-all;
      }

      .option-subdesc {
        display: block;
        margin-top: 2px;
        color: #777;
        font-size: 13px;
        font-weight: 400;
        line-height: 1.4;
      }

      .option-price {
        color: #d35400;
        font-size: 15px;
        font-weight: 800;
        white-space: nowrap;
      }

      .nested-options {
        margin: 0 0 8px 34px;
        padding: 10px 12px;
        background: #fffaf4;
        border: 1px solid #f2dfc2;
        border-radius: 12px;
      }

      .nested-title {
        font-size: 14px;
        font-weight: 900;
        color: #7a4a00;
        margin: 4px 0 6px;
      }

      .nested-option-group + .nested-option-group {
        border-top: 1px dashed #ead5b6;
        margin-top: 8px;
        padding-top: 8px;
      }

      .qty-control {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 14px 0;
      }

      .qty-control button {
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: #ffb347;
        color: #fff;
        font-size: 20px;
        cursor: pointer;
      }

      .modal-action {
        width: 100%;
        border: none;
        border-radius: 14px;
        padding: 15px;
        background: #e67e22;
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 10px;
      }

      .cart-item {
        background: #fff;
        border: 1px solid #eee0cb;
        border-radius: 14px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .cart-item-top {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 10px;
        font-weight: 800;
      }

      .cart-item-name {
        min-width: 0;
        line-height: 1.4;
      }

      .cart-item-price {
        white-space: nowrap;
        font-weight: 900;
        color: #222;
      }

      .cart-options {
        color: #777;
        font-size: 13px;
        margin-top: 6px;
        line-height: 1.6;
        white-space: pre-line;
      }

      .remove-btn {
        border: none;
        background: #f3d7d2;
        color: #a93226;
        border-radius: 999px;
        padding: 5px 9px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-weight: 700;
        font-size: 14px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 16px;
        font-family: inherit;
        background: #fff;
      }

      textarea {
        min-height: 70px;
        resize: vertical;
      }

      input[type="radio"],
      input[type="checkbox"] {
        width: auto;
        flex: 0 0 auto;
        margin: 0;
        accent-color: #ff7900;
      }

      .total {
        text-align: right;
        font-size: 22px;
        font-weight: 900;
        color: #d35400;
        margin: 14px 0;
      }

      .message {
        display: none;
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        line-height: 1.6;
      }

      .message.success {
        display: block;
        background: #e8f8ef;
        color: #1e8449;
        border: 1px solid #a9dfbf;
      }

      .message.error {
        display: block;
        background: #fdecea;
        color: #c0392b;
        border: 1px solid #f5b7b1;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="store-header">
        <div class="hero-image">
          <img src="images/hero.jpeg" alt="早八滿堂餐點封面圖" />
        </div>

        <div class="store-profile">
          <div class="store-logo">
            <img src="images/logo.png" alt="早八滿堂 LOGO" />
          </div>

          <h1 class="store-name">早八滿堂</h1>
          <p class="store-slogan">早餐還是得喝大冰奶</p>
        </div>
      </div>

      <div class="notice">
        <strong>訂餐說明</strong><br />
        ．訂單截止時間：週五上午 10:00<br />
        ．配送時間：約 11:00–12:00 依樓層順路配送<br />
        ．請務必填寫正確樓層、櫃位名稱與手機號碼
      </div>

      <div id="categoryNav" class="category-nav"></div>
      <div id="productSections"></div>
      <div id="messageBox" class="message"></div>
    </div>

    <div class="cart-bar">
      <div class="cart-bar-inner">
        <div class="cart-info">
          購物車 <span id="cartCount">0</span> 項｜$<span id="cartTotal"
            >0</span
          >
        </div>
        <button class="cart-btn" onclick="openCartModal()">查看購物車</button>
      </div>
    </div>

    <!-- 單點商品 Modal -->
    <div id="productModalOverlay" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalProductName"></h2>
          <button class="close-btn" onclick="closeProductModal()">×</button>
        </div>

        <div id="modalProductDesc"></div>
        <div class="price" style="margin-top: 10px">
          單價：$<span id="modalProductBasePrice"></span>
        </div>

        <div id="optionArea" style="margin-top: 14px"></div>

        <div class="qty-control">
          <button onclick="changeModalQty(-1)">−</button>
          <strong id="modalQty">1</strong>
          <button onclick="changeModalQty(1)">＋</button>
        </div>

        <div class="total">小計：$<span id="modalSubtotal">0</span></div>

        <button class="modal-action" onclick="addCurrentProductToCart()">
          加入購物車
        </button>
      </div>
    </div>

    <!-- 套餐 Modal -->
    <div id="comboModalOverlay" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalComboName"></h2>
          <button class="close-btn" onclick="closeComboModal()">×</button>
        </div>

        <div id="modalComboDesc"></div>
        <div class="price" style="margin-top: 10px">
          套餐價：$<span id="modalComboBasePrice"></span> 起
        </div>

        <div id="comboGroupArea" style="margin-top: 14px"></div>

        <div class="qty-control">
          <button onclick="changeComboQty(-1)">−</button>
          <strong id="modalComboQty">1</strong>
          <button onclick="changeComboQty(1)">＋</button>
        </div>

        <div class="total">小計：$<span id="modalComboSubtotal">0</span></div>

        <button class="modal-action" onclick="addCurrentComboToCart()">
          加入購物車
        </button>
      </div>
    </div>

    <!-- 購物車 Modal -->
    <div id="cartModalOverlay" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>確認購物車</h2>
          <button class="close-btn" onclick="closeCartModal()">×</button>
        </div>

        <div id="cartList"></div>
        <div class="total">總金額：$<span id="cartModalTotal">0</span></div>

        <h3>訂購資料</h3>

        <label>姓名 *</label>
        <input id="name" type="text" placeholder="例：王小姐" />

        <label>手機 *</label>
        <input id="phone" type="tel" placeholder="例：0912345678" />

        <label>漢神樓層 *</label>
        <select id="floor">
          <option value="">請選擇樓層</option>
          <option value="B1">B1</option>
          <option value="1F">1F</option>
          <option value="2F">2F</option>
          <option value="3F">3F</option>
          <option value="4F">4F</option>
          <option value="5F">5F</option>
          <option value="6F">6F</option>
          <option value="其他">其他</option>
        </select>

        <label>櫃位名稱 *</label>
        <input
          id="counter"
          type="text"
          placeholder="例：某某品牌櫃 / 靠近哪個區域"
        />

        <label>付款方式 *</label>
        <select id="payment">
          <option value="現場付款">現場付款</option>
          <option value="LINE Pay">LINE Pay</option>
          <option value="轉帳">轉帳</option>
        </select>

        <label>備註</label>
        <textarea
          id="note"
          placeholder="例：靠近手扶梯旁、請到櫃位門口"
        ></textarea>

        <button id="submitBtn" class="modal-action" onclick="submitOrder()">
          送出訂單
        </button>
      </div>
    </div>

    <script>
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbyvyeXvA2UG93s8ruXBna3ponofrVwoSFeB9uDWKKJoEoCiiHkbsGdO-E-_Ni2BTAbZ/exec";
      const SECRET_TOKEN = "zaoba_hanshin_2026";
      const IMAGE_BASE_PATH = "images/";

      let menuData = null;
      let cart = [];

      let currentProduct = null;
      let currentQty = 1;

      let currentCombo = null;
      let currentComboQty = 1;
      let currentComboState = {};

      function loadMenuConfig() {
        const callbackName = "handleMenuConfig_" + Date.now();

        window[callbackName] = function (data) {
          console.log("Apps Script 回傳資料", data);

          if (!data.success) {
            showMessage("商品資料讀取失敗：" + (data.message || ""), "error");
            return;
          }

          menuData = data;
          renderCategoryNav();
          renderProducts();
        };

        const script = document.createElement("script");
        script.src = `${GAS_URL}?action=config&callback=${callbackName}`;
        script.onerror = function () {
          showMessage(
            "商品資料載入失敗，請檢查 Apps Script 部署網址。",
            "error"
          );
        };
        document.body.appendChild(script);
      }

      function getMenuItems() {
        if (!menuData) return [];

        if (Array.isArray(menuData.menuItems)) {
          return menuData.menuItems;
        }

        const products = (menuData.products || []).map((p) => ({
          ...p,
          type: "product",
          displayId: p.id,
          displayPrice: p.price,
        }));

        const combos = (menuData.combos || []).map((c) => ({
          ...c,
          type: "combo",
          displayId: c.comboId,
          displayPrice: c.basePrice,
        }));

        return [...products, ...combos];
      }

      function renderCategoryNav() {
        const nav = document.getElementById("categoryNav");

        if (!nav) return;

        if (!menuData.categories || menuData.categories.length === 0) {
          nav.innerHTML = `<div style="color:#c0392b;">尚未設定商品分類</div>`;
          return;
        }

        nav.innerHTML = menuData.categories
          .map(
            (cat) => `
              <button onclick="scrollToCategory('${escapeHtml(
                cat.category
              )}')">${escapeHtml(cat.category)}</button>
            `
          )
          .join("");
      }

      function renderProducts() {
        const container = document.getElementById("productSections");
        const menuItems = getMenuItems();

        if (!container) return;

        if (!menuItems.length) {
          container.innerHTML = `
            <div style="background:#fff;padding:16px;border-radius:12px;color:#c0392b;">
              尚未讀取到商品或套餐資料，請檢查 Google 試算表設定。
            </div>
          `;
          return;
        }

        container.innerHTML = menuData.categories
          .map((cat) => {
            const category = cat.category;
            const categoryDesc = cat.desc || "";
            const items = menuItems.filter(
              (item) => item.category === category
            );

            if (items.length === 0) return "";

            return `
              <section id="category-${safeId(category)}">
                <div class="category-heading">
                  <div class="category-title">${escapeHtml(category)}</div>
                  ${
                    categoryDesc
                      ? `<div class="category-desc">${escapeHtml(
                          categoryDesc
                        )}</div>`
                      : ""
                  }
                </div>

                ${items
                  .map((item) => {
                    const itemId =
                      item.type === "combo" ? item.comboId : item.id;
                    const imageSrc = `${IMAGE_BASE_PATH}${itemId}.jpg`;
                    const qtyInCart = getMenuItemQtyInCart(item.type, itemId);
                    const openFn =
                      item.type === "combo"
                        ? `openComboModal('${item.comboId}')`
                        : `openProductModal('${item.id}')`;

                    return `
                      <div class="product-card">
                        <div class="product-info" onclick="${openFn}">
                          ${
                            item.type === "combo"
                              ? `<span class="product-type-badge">套餐</span>`
                              : ""
                          }
                          <h3 class="product-name">${escapeHtml(item.name)}</h3>
                          <div class="product-price">$${
                            item.displayPrice || item.price || item.basePrice
                          }</div>
                          <p class="product-desc">${escapeHtml(
                            item.desc || ""
                          )}</p>
                        </div>

                        <div class="product-image-box" onclick="${openFn}">
                          <img
                            src="${imageSrc}"
                            alt="${escapeHtml(item.name)}"
                            onerror="handleProductImageError(this)"
                          >
                          <div class="product-add-badge ${
                            qtyInCart > 0 ? "has-items" : ""
                          }">
                            ${qtyInCart > 0 ? qtyInCart : "+"}
                          </div>
                        </div>
                      </div>
                    `;
                  })
                  .join("")}
              </section>
            `;
          })
          .join("");
      }

      function getMenuItemQtyInCart(type, id) {
        return cart
          .filter((item) => item.type === type && item.id === id)
          .reduce((sum, item) => sum + Number(item.qty || 0), 0);
      }

      function getProductQtyInCart(productId) {
        return getMenuItemQtyInCart("product", productId);
      }

      function handleProductImageError(img) {
        const box = img.closest(".product-image-box");
        if (box) box.classList.add("no-image");
        img.style.display = "none";
      }

      function scrollToCategory(category) {
        const target = document.getElementById(`category-${safeId(category)}`);
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function openProductModal(productId) {
        currentProduct = (menuData.products || []).find(
          (p) => p.id === productId
        );
        if (!currentProduct) {
          showMessage("找不到商品資料。", "error");
          return;
        }

        currentQty = 1;

        document.getElementById("modalProductName").textContent =
          currentProduct.name;
        document.getElementById("modalProductDesc").textContent =
          currentProduct.desc || "";
        document.getElementById("modalProductBasePrice").textContent =
          currentProduct.price;
        document.getElementById("modalQty").textContent = currentQty;

        renderOptionGroups();
        updateModalSubtotal();

        document.getElementById("productModalOverlay").classList.add("show");
      }

      function closeProductModal() {
        document.getElementById("productModalOverlay").classList.remove("show");
      }

      function renderOptionGroups() {
        const optionArea = document.getElementById("optionArea");
        optionArea.innerHTML = renderProductOptionGroupsHtml(
          currentProduct.optionGroups || [],
          "product",
          {}
        );
      }

      function renderProductOptionGroupsHtml(
        optionGroups,
        prefix,
        selectedMap
      ) {
        if (!optionGroups || optionGroups.length === 0) {
          return `<div style="color:#777;">此餐點無客製化選項</div>`;
        }

        return optionGroups
          .map((group) =>
            renderProductOptionGroupHtml(group, prefix, selectedMap)
          )
          .join("");
      }

      function renderProductOptionGroupHtml(group, prefix, selectedMap) {
        const inputType = group.type === "multiple" ? "checkbox" : "radio";
        const name = `${prefix}-${group.groupId}`;
        const selectedIds = selectedMap[group.groupId] || [];

        return `
          <div class="option-group" data-group-id="${
            group.groupId
          }" data-type="${group.type}" data-required="${
          group.required
        }" data-min="${group.min}" data-max="${group.max}">
            <h4>${escapeHtml(group.groupName)} ${
          group.required ? '<span style="color:#c0392b;">＊</span>' : ""
        }</h4>
            ${group.options
              .map((option, index) => {
                const shouldCheck =
                  selectedIds.includes(option.optionId) ||
                  (!selectedIds.length &&
                    group.type === "single" &&
                    group.required &&
                    index === 0);

                return `
                  <label class="option-row">
                    <input
                      type="${inputType}"
                      name="${name}"
                      value="${option.optionId}"
                      data-group-id="${group.groupId}"
                      data-group-name="${escapeHtml(group.groupName)}"
                      data-option-name="${escapeHtml(option.optionName)}"
                      data-price-delta="${option.priceDelta}"
                      ${shouldCheck ? "checked" : ""}
                      onchange="updateModalSubtotal()"
                    >
                    <span class="option-name">${escapeHtml(
                      option.optionName
                    )}</span>
                    <span class="option-price">${
                      Number(option.priceDelta) > 0
                        ? `+$${option.priceDelta}`
                        : ""
                    }</span>
                  </label>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function changeModalQty(amount) {
        currentQty = Math.max(1, currentQty + amount);
        document.getElementById("modalQty").textContent = currentQty;
        updateModalSubtotal();
      }

      function getSelectedOptions(containerSelector = "#optionArea") {
        const checked = document.querySelectorAll(
          `${containerSelector} input:checked`
        );

        return Array.from(checked).map((input) => ({
          groupId: input.dataset.groupId,
          groupName: input.dataset.groupName,
          optionId: input.value,
          optionName: input.dataset.optionName,
          priceDelta: Number(input.dataset.priceDelta || 0),
        }));
      }

      function validateProductOptions(containerSelector = "#optionArea") {
        const groups = document.querySelectorAll(
          `${containerSelector} .option-group`
        );

        for (const groupEl of groups) {
          const groupName = groupEl
            .querySelector("h4")
            .textContent.replace("＊", "")
            .trim();
          const required = groupEl.dataset.required === "true";
          const min = Number(groupEl.dataset.min || 0);
          const max = Number(groupEl.dataset.max || 999);
          const selectedCount =
            groupEl.querySelectorAll("input:checked").length;

          if (required && selectedCount === 0) {
            showMessage(`請選擇「${groupName}」。`, "error");
            return false;
          }

          if (selectedCount < min) {
            showMessage(`「${groupName}」至少需要選擇 ${min} 項。`, "error");
            return false;
          }

          if (selectedCount > max) {
            showMessage(`「${groupName}」最多只能選擇 ${max} 項。`, "error");
            return false;
          }
        }

        return true;
      }

      function updateModalSubtotal() {
        if (!currentProduct) return;

        const optionTotal = getSelectedOptions("#optionArea").reduce(
          (sum, opt) => sum + opt.priceDelta,
          0
        );
        const unitPrice = currentProduct.price + optionTotal;
        const subtotal = unitPrice * currentQty;

        document.getElementById("modalSubtotal").textContent = subtotal;
      }

      function addCurrentProductToCart() {
        if (!validateProductOptions("#optionArea")) return;

        const selectedOptions = getSelectedOptions("#optionArea");
        const optionTotal = selectedOptions.reduce(
          (sum, opt) => sum + opt.priceDelta,
          0
        );
        const unitPrice = currentProduct.price + optionTotal;
        const subtotal = unitPrice * currentQty;

        cart.push({
          cartId: createCartId(),
          type: "product",
          id: currentProduct.id,
          name: currentProduct.name,
          basePrice: currentProduct.price,
          unitPrice,
          qty: currentQty,
          subtotal,
          options: selectedOptions,
        });

        closeProductModal();
        updateCartBar();
        renderProducts();
        showMessage("已加入購物車。", "success");
      }

      function openComboModal(comboId) {
        currentCombo = (menuData.combos || []).find(
          (c) => c.comboId === comboId
        );
        if (!currentCombo) {
          showMessage("找不到套餐資料。", "error");
          return;
        }

        currentComboQty = 1;
        initializeComboState();

        document.getElementById("modalComboName").textContent =
          currentCombo.name;
        document.getElementById("modalComboDesc").textContent =
          currentCombo.desc || "";
        document.getElementById("modalComboBasePrice").textContent =
          currentCombo.basePrice;
        document.getElementById("modalComboQty").textContent = currentComboQty;

        renderComboGroups();
        updateComboSubtotal();

        document.getElementById("comboModalOverlay").classList.add("show");
      }

      function closeComboModal() {
        document.getElementById("comboModalOverlay").classList.remove("show");
      }

      function initializeComboState() {
        currentComboState = {};

        (currentCombo.groups || []).forEach((group) => {
          const min = Number(group.min || 0);
          const max = Number(group.max || 1);
          const defaultCount = min > 0 ? min : group.required ? 1 : 0;

          currentComboState[group.groupId] = {
            selectedProductIds: [],
            optionSelections: {},
          };

          if (defaultCount > 0) {
            group.options
              .slice(0, max === 1 ? 1 : defaultCount)
              .forEach((opt) => {
                currentComboState[group.groupId].selectedProductIds.push(
                  opt.product.id
                );
                ensureDefaultProductOptionSelections(
                  group.groupId,
                  opt.product.id
                );
              });
          }
        });
      }

      function ensureDefaultProductOptionSelections(comboGroupId, productId) {
        const groupState = currentComboState[comboGroupId];
        if (!groupState) return;

        if (!groupState.optionSelections[productId]) {
          groupState.optionSelections[productId] = {};
        }

        const product = findComboOptionProduct(comboGroupId, productId);
        if (!product) return;

        (product.optionGroups || []).forEach((optionGroup) => {
          if (!groupState.optionSelections[productId][optionGroup.groupId]) {
            groupState.optionSelections[productId][optionGroup.groupId] = [];

            if (
              optionGroup.type === "single" &&
              optionGroup.required &&
              optionGroup.options.length > 0
            ) {
              groupState.optionSelections[productId][optionGroup.groupId] = [
                optionGroup.options[0].optionId,
              ];
            }
          }
        });
      }

      function findComboOption(comboGroupId, productId) {
        const group = (currentCombo.groups || []).find(
          (g) => g.groupId === comboGroupId
        );
        if (!group) return null;
        return (
          (group.options || []).find(
            (opt) => opt.product && opt.product.id === productId
          ) || null
        );
      }

      function findComboOptionProduct(comboGroupId, productId) {
        const opt = findComboOption(comboGroupId, productId);
        return opt ? opt.product : null;
      }

      function renderComboGroups() {
        const area = document.getElementById("comboGroupArea");

        if (!currentCombo.groups || currentCombo.groups.length === 0) {
          area.innerHTML = `<div style="color:#777;">此套餐尚未設定選擇項目</div>`;
          return;
        }

        area.innerHTML = currentCombo.groups
          .map((group) => {
            const max = Number(group.max || 1);
            const inputType = max > 1 ? "checkbox" : "radio";
            const state = currentComboState[group.groupId] || {
              selectedProductIds: [],
            };

            return `
              <div class="combo-choice-group" data-combo-group-id="${
                group.groupId
              }" data-required="${group.required}" data-min="${
              group.min
            }" data-max="${group.max}">
                <h4>${escapeHtml(group.groupName)} ${
              group.required ? '<span style="color:#c0392b;">＊</span>' : ""
            }</h4>

                ${(group.options || [])
                  .map((opt) => {
                    const product = opt.product;
                    const checked = state.selectedProductIds.includes(
                      product.id
                    );
                    return `
                      <label class="option-row">
                        <input
                          type="${inputType}"
                          name="combo-${group.groupId}"
                          value="${product.id}"
                          ${checked ? "checked" : ""}
                          onchange="handleComboChoiceChange('${
                            group.groupId
                          }', '${product.id}', this.checked)"
                        >
                        <span class="option-name">
                          ${escapeHtml(product.name)}
                          ${
                            product.desc
                              ? `<span class="option-subdesc">${escapeHtml(
                                  product.desc
                                )}</span>`
                              : ""
                          }
                        </span>
                        <span class="option-price">${
                          Number(opt.priceDelta) > 0
                            ? `+$${opt.priceDelta}`
                            : ""
                        }</span>
                      </label>

                      ${
                        checked &&
                        product.optionGroups &&
                        product.optionGroups.length
                          ? `<div class="nested-options">${renderComboNestedOptions(
                              group.groupId,
                              product
                            )}</div>`
                          : ""
                      }
                    `;
                  })
                  .join("")}
              </div>
            `;
          })
          .join("");
      }

      function renderComboNestedOptions(comboGroupId, product) {
        const state = currentComboState[comboGroupId];
        const selectedMap =
          state && state.optionSelections[product.id]
            ? state.optionSelections[product.id]
            : {};

        return (product.optionGroups || [])
          .map((group) => {
            const inputType = group.type === "multiple" ? "checkbox" : "radio";
            const name = `combo-nested-${comboGroupId}-${product.id}-${group.groupId}`;
            const selectedIds = selectedMap[group.groupId] || [];

            return `
              <div class="nested-option-group option-group" data-group-id="${
                group.groupId
              }" data-type="${group.type}" data-required="${
              group.required
            }" data-min="${group.min}" data-max="${
              group.max
            }" data-combo-group-id="${comboGroupId}" data-product-id="${
              product.id
            }">
                <div class="nested-title">${escapeHtml(group.groupName)} ${
              group.required ? '<span style="color:#c0392b;">＊</span>' : ""
            }</div>

                ${(group.options || [])
                  .map((option, index) => {
                    const checked =
                      selectedIds.includes(option.optionId) ||
                      (!selectedIds.length &&
                        group.type === "single" &&
                        group.required &&
                        index === 0);

                    return `
                      <label class="option-row">
                        <input
                          type="${inputType}"
                          name="${name}"
                          value="${option.optionId}"
                          data-group-id="${group.groupId}"
                          data-group-name="${escapeHtml(group.groupName)}"
                          data-option-name="${escapeHtml(option.optionName)}"
                          data-price-delta="${option.priceDelta}"
                          ${checked ? "checked" : ""}
                          onchange="handleComboNestedOptionChange('${comboGroupId}', '${
                      product.id
                    }', '${group.groupId}')"
                        >
                        <span class="option-name">${escapeHtml(
                          option.optionName
                        )}</span>
                        <span class="option-price">${
                          Number(option.priceDelta) > 0
                            ? `+$${option.priceDelta}`
                            : ""
                        }</span>
                      </label>
                    `;
                  })
                  .join("")}
              </div>
            `;
          })
          .join("");
      }

      function handleComboChoiceChange(comboGroupId, productId, checked) {
        const group = (currentCombo.groups || []).find(
          (g) => g.groupId === comboGroupId
        );
        if (!group) return;

        const max = Number(group.max || 1);
        const state = currentComboState[comboGroupId];

        if (max === 1) {
          state.selectedProductIds = [productId];
          ensureDefaultProductOptionSelections(comboGroupId, productId);
        } else {
          if (checked) {
            if (!state.selectedProductIds.includes(productId)) {
              if (state.selectedProductIds.length >= max) {
                showMessage(
                  `「${group.groupName}」最多只能選擇 ${max} 項。`,
                  "error"
                );
                renderComboGroups();
                return;
              }
              state.selectedProductIds.push(productId);
              ensureDefaultProductOptionSelections(comboGroupId, productId);
            }
          } else {
            state.selectedProductIds = state.selectedProductIds.filter(
              (id) => id !== productId
            );
          }
        }

        renderComboGroups();
        updateComboSubtotal();
      }

      function handleComboNestedOptionChange(
        comboGroupId,
        productId,
        optionGroupId
      ) {
        const inputs = document.querySelectorAll(
          `input[name="combo-nested-${comboGroupId}-${productId}-${optionGroupId}"]:checked`
        );

        if (!currentComboState[comboGroupId].optionSelections[productId]) {
          currentComboState[comboGroupId].optionSelections[productId] = {};
        }

        currentComboState[comboGroupId].optionSelections[productId][
          optionGroupId
        ] = Array.from(inputs).map((input) => input.value);

        updateComboSubtotal();
      }

      function changeComboQty(amount) {
        currentComboQty = Math.max(1, currentComboQty + amount);
        document.getElementById("modalComboQty").textContent = currentComboQty;
        updateComboSubtotal();
      }

      function getSelectedNestedOptionsForProduct(comboGroupId, product) {
        const groupState = currentComboState[comboGroupId];
        const selectedMap =
          groupState && groupState.optionSelections[product.id]
            ? groupState.optionSelections[product.id]
            : {};
        const result = [];

        (product.optionGroups || []).forEach((optionGroup) => {
          const selectedIds = selectedMap[optionGroup.groupId] || [];

          selectedIds.forEach((optionId) => {
            const option = (optionGroup.options || []).find(
              (opt) => opt.optionId === optionId
            );
            if (option) {
              result.push({
                groupId: optionGroup.groupId,
                groupName: optionGroup.groupName,
                optionId: option.optionId,
                optionName: option.optionName,
                priceDelta: Number(option.priceDelta || 0),
              });
            }
          });
        });

        return result;
      }

      function validateComboSelections() {
        for (const group of currentCombo.groups || []) {
          const state = currentComboState[group.groupId] || {
            selectedProductIds: [],
          };
          const selectedCount = state.selectedProductIds.length;
          const min = Number(group.min || 0);
          const max = Number(group.max || 999);

          if (group.required && selectedCount === 0) {
            showMessage(`請選擇「${group.groupName}」。`, "error");
            return false;
          }

          if (selectedCount < min) {
            showMessage(
              `「${group.groupName}」至少需要選擇 ${min} 項。`,
              "error"
            );
            return false;
          }

          if (selectedCount > max) {
            showMessage(
              `「${group.groupName}」最多只能選擇 ${max} 項。`,
              "error"
            );
            return false;
          }

          for (const productId of state.selectedProductIds) {
            const product = findComboOptionProduct(group.groupId, productId);
            if (!product) continue;

            for (const optionGroup of product.optionGroups || []) {
              const selectedIds =
                state.optionSelections[productId] &&
                state.optionSelections[productId][optionGroup.groupId]
                  ? state.optionSelections[productId][optionGroup.groupId]
                  : [];

              if (optionGroup.required && selectedIds.length === 0) {
                showMessage(
                  `請選擇「${product.name}」的「${optionGroup.groupName}」。`,
                  "error"
                );
                return false;
              }

              if (selectedIds.length < Number(optionGroup.min || 0)) {
                showMessage(
                  `「${product.name}」的「${optionGroup.groupName}」至少需要選擇 ${optionGroup.min} 項。`,
                  "error"
                );
                return false;
              }

              if (selectedIds.length > Number(optionGroup.max || 999)) {
                showMessage(
                  `「${product.name}」的「${optionGroup.groupName}」最多只能選擇 ${optionGroup.max} 項。`,
                  "error"
                );
                return false;
              }
            }
          }
        }

        return true;
      }

      function calculateComboUnitPrice() {
        if (!currentCombo) return 0;

        let unitPrice = Number(currentCombo.basePrice || 0);

        (currentCombo.groups || []).forEach((group) => {
          const state = currentComboState[group.groupId];
          if (!state) return;

          state.selectedProductIds.forEach((productId) => {
            const comboOption = findComboOption(group.groupId, productId);
            if (!comboOption) return;

            unitPrice += Number(comboOption.priceDelta || 0);

            const product = comboOption.product;
            const selectedOptions = getSelectedNestedOptionsForProduct(
              group.groupId,
              product
            );
            unitPrice += selectedOptions.reduce(
              (sum, opt) => sum + Number(opt.priceDelta || 0),
              0
            );
          });
        });

        return unitPrice;
      }

      function updateComboSubtotal() {
        const unitPrice = calculateComboUnitPrice();
        document.getElementById("modalComboSubtotal").textContent =
          unitPrice * currentComboQty;
      }

      function buildComboGroupsForCart() {
        return (currentCombo.groups || []).map((group) => {
          const state = currentComboState[group.groupId] || {
            selectedProductIds: [],
          };

          return {
            groupId: group.groupId,
            groupName: group.groupName,
            selectedProducts: state.selectedProductIds.map((productId) => {
              const comboOption = findComboOption(group.groupId, productId);
              const product = comboOption.product;
              const options = getSelectedNestedOptionsForProduct(
                group.groupId,
                product
              );

              return {
                id: product.id,
                name: product.name,
                priceDelta: Number(comboOption.priceDelta || 0),
                options: options,
              };
            }),
          };
        });
      }

      function addCurrentComboToCart() {
        if (!validateComboSelections()) return;

        const unitPrice = calculateComboUnitPrice();
        const subtotal = unitPrice * currentComboQty;

        cart.push({
          cartId: createCartId(),
          type: "combo",
          id: currentCombo.comboId,
          name: currentCombo.name,
          basePrice: currentCombo.basePrice,
          unitPrice,
          qty: currentComboQty,
          subtotal,
          comboGroups: buildComboGroupsForCart(),
        });

        closeComboModal();
        updateCartBar();
        renderProducts();
        showMessage("已加入購物車。", "success");
      }

      function updateCartBar() {
        const count = cart.reduce(
          (sum, item) => sum + Number(item.qty || 0),
          0
        );
        const total = cart.reduce(
          (sum, item) => sum + Number(item.subtotal || 0),
          0
        );

        document.getElementById("cartCount").textContent = count;
        document.getElementById("cartTotal").textContent = total;
      }

      function openCartModal() {
        renderCartModal();
        document.getElementById("cartModalOverlay").classList.add("show");
      }

      function closeCartModal() {
        document.getElementById("cartModalOverlay").classList.remove("show");
      }

      function formatProductOptions(item) {
        if (!item.options || !item.options.length) return "";

        return item.options
          .map(
            (opt) =>
              `${opt.groupName}：${opt.optionName}${
                opt.priceDelta > 0 ? `＋$${opt.priceDelta}` : ""
              }`
          )
          .join("、");
      }

      function formatComboOptions(item) {
        if (!item.comboGroups || !item.comboGroups.length) return "";

        return item.comboGroups
          .map((group) => {
            const selectedText = (group.selectedProducts || [])
              .map((product) => {
                const deltaText =
                  product.priceDelta > 0 ? `＋$${product.priceDelta}` : "";
                const optionText =
                  product.options && product.options.length
                    ? `（${product.options
                        .map(
                          (opt) =>
                            `${opt.groupName}：${opt.optionName}${
                              opt.priceDelta > 0 ? `＋$${opt.priceDelta}` : ""
                            }`
                        )
                        .join("、")}）`
                    : "";

                return `${product.name}${deltaText}${optionText}`;
              })
              .join("、");

            return `${group.groupName}：${selectedText}`;
          })
          .join("\n");
      }

      function renderCartModal() {
        const cartList = document.getElementById("cartList");

        if (cart.length === 0) {
          cartList.innerHTML = `<div style="color:#777;">購物車目前是空的</div>`;
        } else {
          cartList.innerHTML = cart
            .map((item) => {
              const optionText =
                item.type === "combo"
                  ? formatComboOptions(item)
                  : formatProductOptions(item);

              return `
                <div class="cart-item">
                  <div class="cart-item-top">
                    <div class="cart-item-name">${escapeHtml(item.name)} × ${
                item.qty
              }</div>
                    <div class="cart-item-price">$${item.subtotal}</div>
                    <button class="remove-btn" onclick="removeCartItem('${
                      item.cartId
                    }')">移除</button>
                  </div>
                  ${
                    optionText
                      ? `<div class="cart-options">${escapeHtml(
                          optionText
                        )}</div>`
                      : ""
                  }
                </div>
              `;
            })
            .join("");
        }

        document.getElementById("cartModalTotal").textContent = cart.reduce(
          (sum, item) => sum + item.subtotal,
          0
        );
      }

      function removeCartItem(cartId) {
        cart = cart.filter((item) => item.cartId !== cartId);
        updateCartBar();
        renderProducts();
        renderCartModal();
      }

      function validateOrder() {
        if (cart.length === 0) {
          showMessage("購物車目前是空的。", "error");
          return false;
        }

        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const floor = document.getElementById("floor").value;
        const counter = document.getElementById("counter").value.trim();

        if (!name) {
          showMessage("請填寫姓名。", "error");
          return false;
        }

        if (!/^09\d{8}$/.test(phone)) {
          showMessage("請輸入正確手機號碼，格式為 09 開頭共 10 碼。", "error");
          return false;
        }

        if (!floor) {
          showMessage("請選擇樓層。", "error");
          return false;
        }

        if (!counter) {
          showMessage("請填寫櫃位名稱。", "error");
          return false;
        }

        return true;
      }

      async function submitOrder() {
        if (!validateOrder()) return;

        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.textContent = "訂單送出中...";

        const total = cart.reduce((sum, item) => sum + item.subtotal, 0);

        const orderData = {
          source: "hanshin_order_page",
          token: SECRET_TOKEN,
          customer: {
            name: document.getElementById("name").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            floor: document.getElementById("floor").value,
            counter: document.getElementById("counter").value.trim(),
            payment: document.getElementById("payment").value,
            note: document.getElementById("note").value.trim(),
          },
          items: cart,
          total,
        };

        try {
          await fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(orderData),
          });

          showMessage("訂單已送出！請留意手機聯絡，謝謝。", "success");

          cart = [];
          updateCartBar();
          renderProducts();
          renderCartModal();
          closeCartModal();

          document.getElementById("name").value = "";
          document.getElementById("phone").value = "";
          document.getElementById("floor").value = "";
          document.getElementById("counter").value = "";
          document.getElementById("payment").value = "現場付款";
          document.getElementById("note").value = "";
        } catch (error) {
          console.error(error);
          showMessage("訂單送出失敗，請稍後再試或聯絡店家。", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "送出訂單";
        }
      }

      function showMessage(text, type) {
        const messageBox = document.getElementById("messageBox");
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;

        setTimeout(() => {
          messageBox.className = "message";
        }, 3000);
      }

      function safeId(text) {
        return String(text).replace(/[^\w\u4e00-\u9fa5]/g, "-");
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function createCartId() {
        return crypto.randomUUID
          ? crypto.randomUUID()
          : String(Date.now() + Math.random());
      }

      function setupModalOverlayClose() {
        const productOverlay = document.getElementById("productModalOverlay");
        const comboOverlay = document.getElementById("comboModalOverlay");
        const cartOverlay = document.getElementById("cartModalOverlay");

        if (productOverlay) {
          productOverlay.addEventListener("click", function (event) {
            if (event.target === productOverlay) closeProductModal();
          });
        }

        if (comboOverlay) {
          comboOverlay.addEventListener("click", function (event) {
            if (event.target === comboOverlay) closeComboModal();
          });
        }

        if (cartOverlay) {
          cartOverlay.addEventListener("click", function (event) {
            if (event.target === cartOverlay) closeCartModal();
          });
        }

        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") {
            closeProductModal();
            closeComboModal();
            closeCartModal();
          }
        });
      }

      setupModalOverlayClose();
      loadMenuConfig();
    </script>
  </body>
</html>
