<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>早八滿堂｜線上訂餐</title>
    <meta name="description" content="早八滿堂線上訂餐，多分店選擇頁面。" />
    <style>
      :root {
        --bg: #f6f6f6;
        --card: #ffffff;
        --text: #24272d;
        --muted: #6b7280;
        --line: #e5e7eb;
        --brand: #f6a623;
        --tag: #4b5563;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
        line-height: 1.45;
      }

      .page {
        max-width: 760px;
        min-height: 100vh;
        margin: 0 auto;
        background: #fff;
      }

      .hero {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: linear-gradient(
            135deg,
            rgba(246, 166, 35, 0.22),
            rgba(255, 255, 255, 0.1)
          ),
          url("./cover.png") center / cover no-repeat;
        border-bottom: 1px solid var(--line);
      }

      .brand-section {
        padding: 30px 32px 34px;
        background: #fff;
        border-bottom: 1px solid var(--line);
      }

      .brand-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand-name {
        margin: 0;
        font-size: clamp(34px, 6vw, 48px);
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .brand-subtitle {
        margin: 8px 0 0;
        font-size: clamp(17px, 3.2vw, 23px);
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      .brand-logo {
        width: 112px;
        height: 112px;
        flex: 0 0 auto;
        border-radius: 14px;
        background: #111 url("./logo.png") center / 72% auto no-repeat;
        box-shadow: var(--shadow);
      }
      .store-list {
        padding: 22px 0 30px;
        background: #fff;
      }

      .store-card {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 20px;
        width: 100%;
        padding: 18px 32px;
        color: inherit;
        text-decoration: none;
        border: 0;
        background: #fff;
        cursor: pointer;
        text-align: left;
      }

      .store-card + .store-card {
        border-top: 1px solid #f1f1f1;
      }

      .store-card:active {
        background: #f9fafb;
      }

      .store-photo {
        width: 140px;
        height: 140px;
        border-radius: 10px;
        overflow: hidden;
        background: #e5e7eb;
        border: 1px solid #d1d5db;
        position: relative;
      }

      .store-photo img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .store-photo::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      }

      .store-content {
        min-width: 0;
        padding-top: 2px;
      }

      .store-title-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 4px;
      }

      .store-title {
        font-size: clamp(20px, 3.8vw, 28px);
        font-weight: 900;
        letter-spacing: 0.01em;
        line-height: 1.2;
      }

      .distance {
        font-size: clamp(20px, 3.8vw, 28px);
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
      }

      .address,
      .phone {
        font-size: clamp(17px, 3.2vw, 23px);
        color: var(--text);
        line-height: 1.28;
        word-break: keep-all;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 6px;
        padding: 3px 10px 5px;
        border-radius: 5px;
        background: var(--tag);
        color: #fff;
        font-size: clamp(18px, 3.8vw, 26px);
        font-weight: 900;
        line-height: 1.1;
      }

      .hint {
        padding: 0 32px 30px;
        color: var(--muted);
        font-size: 15px;
      }

      .fallback {
        display: none;
        width: 100%;
        height: 100%;
        place-items: center;
        padding: 12px;
        color: #6b7280;
        font-weight: 800;
        font-size: 20px;
        text-align: center;
        background: linear-gradient(
            135deg,
            rgba(246, 166, 35, 0.18),
            rgba(255, 255, 255, 0.86)
          ),
          #f3f4f6;
      }

      .store-photo img[src=""] + .fallback,
      .store-photo img:not([src]) + .fallback {
        display: grid;
      }

      @media (max-width: 560px) {
        .brand-section {
          padding: 26px 24px 30px;
        }

        .brand-logo {
          width: 84px;
          height: 84px;
          border-radius: 12px;
        }
        .store-card {
          grid-template-columns: 90px 1fr;
          gap: 16px;
          padding: 16px 24px;
        }

        .store-photo {
          width: 90px;
          height: 90px;
        }

        .hint {
          padding-left: 24px;
          padding-right: 24px;
        }
      }

      @media (max-width: 390px) {
        .store-card {
          grid-template-columns: 90px 1fr;
          gap: 12px;
        }

        .store-photo {
          width: 90px;
          height: 90px;
        }

        .store-title-row {
          gap: 6px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="早八滿堂封面照"></section>

      <section class="brand-section">
        <div class="brand-row">
          <div>
            <h1 class="brand-name">早八滿堂</h1>
            <p class="brand-subtitle">請選擇您要訂餐的門市</p>
          </div>
          <div class="brand-logo" aria-label="早八滿堂品牌LOGO"></div>
        </div>
      </section>

      <section
        class="store-list"
        id="storeList"
        aria-label="門市列表"
      ></section>

      <div class="hint">
        ※ 點選門市後會開啟 LINE 線上訂餐頁面。若無法跳轉，請使用手機並確認已安裝
        LINE。
      </div>
    </main>

    <script>
      const stores = [
        {
          name: "台中豐原-豐東店",
          address: "台中市豐原區豐東路42號",
          phone: "04 2522 0006",
          image: "./store-fengdong.jpeg",
          url: "line://app/1607331440-2dNpzWeB?type=order&id=7b0a742ca42b4693a059ff698b5e15aa",
        },
        {
          name: "台中豐原-圓環南店",
          address: "台中市豐原區圓環南路95-1號",
          phone: "04 2527 6136",
          image: "./store-yuanhuan.jpeg",
          url: "line://app/1607331440-2dNpzWeB?type=order&id=7c7b859da8a44efb81141871e2d70214",
        },
        {
          name: "台中豐原-三豐店",
          address: "台中市豐原區三豐路二段43號",
          phone: "04 2525 5557",
          image: "./store-sanfeng.jpeg",
          url: "line://app/1607331440-2dNpzWeB?type=order&id=0fabefffa22a4ca2a8c69cad539e5fe2",
        },
        {
          name: "台中大雅-清泉店",
          address: "台中市大雅區中清路四段910號",
          phone: "04 2567 2256",
          image: "./store-qingquan.jpeg",
          url: "line://app/1607331440-2dNpzWeB?type=order&id=48e1fa117f7643f587bf90aeb42b093f",
        },
      ];

      const list = document.querySelector("#storeList");

      stores.forEach((store) => {
        const card = document.createElement("a");
        card.className = "store-card";
        card.href = store.url;
        card.setAttribute("aria-label", `前往${store.name}訂餐`);

        card.innerHTML = `
        <div class="store-photo">
          <img src="${store.image}" alt="${store.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';">
          <div class="fallback">${store.name}</div>
        </div>
        <div class="store-content">
          <div class="store-title-row">
            <div class="store-title">${store.name}</div>
          </div>
          <div class="address">${store.address}</div>
          <div class="phone">${store.phone}</div>
        </div>
      `;

        list.appendChild(card);
      });
    </script>
  </body>
</html>
